# frontend/nginx-spa.conf
# Nginx INTERNO del contenedor frontend (no confundir con Nginx Proxy Manager).
# Sirve la SPA y reenvia /api al backend Node.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno de Docker. Con `resolver` + variable, Nginx resuelve el nombre
    # en cada request: asi el frontend arranca aunque `api` aun no este listo.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $upstream http://api:3000;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cualquier ruta desconocida -> index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estaticos
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
