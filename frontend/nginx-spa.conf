# frontend/nginx-spa.conf
# Nginx INTERNO del contenedor frontend (no confundir con Nginx Proxy Manager).
# Sirve la SPA y reenvia /api al backend Node.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno de Docker. Con `resolver` + variable, Nginx resuelve el nombre
    # en cada request: asi el frontend arranca aunque `api` aun no este listo.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $upstream http://api:3000;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cualquier ruta desconocida -> index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El index.html NUNCA se cachea: es el que apunta a los assets con hash. Si
    # el navegador lo cachea, tras un deploy sigue pidiendo los assets VIEJOS
    # (que ademas estan cacheados a 1 ano como immutable) y el usuario ve una
    # version mezclada/desactualizada. Con no-cache, el navegador revalida el
    # HTML en cada visita y siempre recibe la referencia al asset mas nuevo.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires -1;
    }

    # Cache de assets estaticos. Llevan hash en el nombre (index-Abc123.css): su
    # contenido nunca cambia, asi que cachearlos a 1 ano es seguro y rapido. En
    # cada deploy cambia el hash -> el navegador pide el nuevo automaticamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
